name: ZWU Auto Book

on:
  workflow_dispatch:  # 支持手动触发
  schedule:
    - cron: '57 12 * * *'  # UTC 12:57 = 北京时间 20:57

permissions:
  contents: read

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Auto Book
        env:
          SCKEY: ${{ secrets.SCKEY }}
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
        run: python demo.py
